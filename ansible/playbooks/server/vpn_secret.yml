# Optional: create the Windscribe VPN secret in the media/transmission namespaces.
- name: Create Windscribe VPN secret in Kubernetes
  hosts: server
  gather_facts: false
  vars_prompt:
    - name: vpn_username
      prompt: "Enter Windscribe username (leave empty to skip)"
      private: no
    - name: vpn_password
      prompt: "Enter Windscribe password (leave empty to skip)"
      private: yes
  tasks:
    - name: Skip when no VPN credentials provided
      ansible.builtin.meta: end_play
      when: vpn_username | default('') | length == 0 or vpn_password | default('') | length == 0

    - name: Create the Windscribe secret
      ansible.builtin.include_role:
        name: vpn_secret
