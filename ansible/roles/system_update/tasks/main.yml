# Full system upgrade. There is no cross-platform "upgrade all" module, so this
# branches per package manager.

- name: Update and upgrade all apt packages (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes
  when: ansible_facts['os_family'] == "Debian"

- name: Update and upgrade all pacman packages (Arch)
  become: true
  community.general.pacman:
    update_cache: yes
    upgrade: yes
  when: ansible_facts['os_family'] == "Archlinux"

- name: Update and upgrade all dnf packages (RHEL/Fedora)
  become: true
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: yes
  when: ansible_facts['os_family'] == "RedHat"

- name: Update Homebrew and upgrade all packages (macOS)
  community.general.homebrew:
    update_homebrew: yes
    upgrade_all: yes
  when: ansible_facts['os_family'] == "Darwin"
